name: Tests

on:
  push:
    branches: [master]
  pull_request:

# Workflow-wide minimal token. A read-only contents token cannot rewrite
# the repo, comment on PRs, or interact with packages — so even if the
# auto-issued GITHUB_TOKEN leaks (the shivammathur/setup-php → composer
# auth-error path has been seen to wrap the token across log lines,
# bypassing Actions' single-line masker) it stays harmless.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    # A github-actions Dependabot bump (an action SHA) changes zero PHP,
    # so the whole matrix is irrelevant — actionlint covers it instead.
    # Composer bumps DO affect dependencies, so they still run the matrix.
    if: ${{ !startsWith(github.head_ref, 'dependabot/github_actions/') }}

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
        phpunit: ['12.0', '13.0']
        include:
          # Coverage on a single representative cell.
          - { php: '8.4', phpunit: '13.0', coverage: true }

    name: "PHP ${{ matrix.php }} / PHPUnit ${{ matrix.phpunit }}"

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring
          coverage: ${{ matrix.coverage && 'pcov' || 'none' }}
          tools: composer:v2

      # shivammathur/setup-php's internal handoff of GITHUB_TOKEN to
      # Composer's auth.json sometimes writes the runner-masked `***`
      # literal instead of the real value. Overwrite auth.json ourselves
      # so Composer sees the real token regardless.
      - name: Configure Composer authentication
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: composer config --global --auth github-oauth.github.com "$GH_TOKEN"

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.composer/cache/files
          key: composer-php${{ matrix.php }}-phpunit${{ matrix.phpunit }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-php${{ matrix.php }}-phpunit${{ matrix.phpunit }}-

      # The test job only runs PHPUnit, so strip the dev-only tools before
      # pinning the matrix PHPUnit version. Infection 0.29 caps PHPUnit at
      # ^12 (its sebastian/diff pin collides with PHPUnit 13), which would
      # otherwise make the PHPUnit 13 cells unresolvable. Pint, PHPStan and
      # Rector aren't needed to run tests either — they get exercised in the
      # static-analysis job against the unpinned composer.json.
      - name: Pin matrix versions
        run: |
          composer remove --dev --no-update infection/infection laravel/pint phpstan/phpstan rector/rector
          composer require --dev --no-update "phpunit/phpunit:^${{ matrix.phpunit }}"

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit ${{ matrix.coverage && '--coverage-clover=coverage.xml' || '' }}

      - name: Upload coverage to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  static-analysis:
    runs-on: ubuntu-latest
    name: Static analysis & code style

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          extensions: mbstring
          coverage: none
          tools: composer:v2

      - name: Configure Composer authentication
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: composer config --global --auth github-oauth.github.com "$GH_TOKEN"

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.composer/cache/files
          key: composer-static-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-static-

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress --error-format=github

      - name: Run Rector (dry-run)
        run: vendor/bin/rector process --dry-run --no-progress-bar

      - name: Run Pint (test mode)
        run: vendor/bin/pint --test

  actionlint:
    runs-on: ubuntu-latest
    name: Lint workflows
    # Cheap on every PR, and the only meaningful check on a
    # github-actions Dependabot bump (which skips the PHP matrix).

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2
