name: Browser

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  firefox:
    runs-on: ${{ matrix.os }}
    name: "Firefox / ${{ matrix.os }} / PHP ${{ matrix.php }} / PHPUnit ${{ matrix.phpunit }}"
    # A github-actions Dependabot bump changes no PHP and no test, so the
    # browser matrix is irrelevant — actionlint (in tests.yml) covers it.
    if: ${{ !startsWith(github.head_ref, 'dependabot/github_actions/') }}

    strategy:
      fail-fast: false
      matrix:
        # Linux on both supported PHP versions, and the browser suite on both
        # PHPUnit 12 and 13. One macOS cell proves the macOS launch path
        # (Firefox app-bundle locator, BiDi connect); macOS minutes bill ~10x
        # so it stays a single representative cell.
        include:
          - { os: ubuntu-latest, php: '8.4', phpunit: '13.0' }
          - { os: ubuntu-latest, php: '8.5', phpunit: '13.0' }
          - { os: ubuntu-latest, php: '8.4', phpunit: '12.0' }
          - { os: macos-latest, php: '8.4', phpunit: '13.0' }

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring
          coverage: none
          tools: composer:v2

      - name: Install Firefox
        uses: browser-actions/setup-firefox@0bc507ddf224827e3b1af68e014d5e42ab93e795 # v1.7.2

      - name: Configure Composer authentication
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: composer config --global --auth github-oauth.github.com "$GH_TOKEN"

      # Pin the matrix PHPUnit version. Infection caps PHPUnit at ^12 on its
      # 0.29 line, so drop it (the browser suite doesn't need it) before pinning.
      - name: Pin PHPUnit version
        run: |
          composer remove --dev --no-update infection/infection
          composer require --dev --no-update "phpunit/phpunit:^${{ matrix.phpunit }}"

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Show Firefox version
        run: firefox --version

      - name: Run browser tests
        run: vendor/bin/phpunit --testsuite Browser
        env:
          TETRYON_HEADLESS: true

      # On failure, ship the diagnostic bundle (screenshot, HTML, console,
      # command trace) so a red build is debuggable without a local repro.
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tetryon-artifacts-${{ matrix.os }}-php${{ matrix.php }}-phpunit${{ matrix.phpunit }}
          path: tests/Browser/Artifacts
          if-no-files-found: ignore
          retention-days: 5
