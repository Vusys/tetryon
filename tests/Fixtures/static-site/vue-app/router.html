<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Tetryon Vue Router</title>
</head>
<body>
    <div id="app">
        <nav>
            <a href="#/" data-testid="link-home">Home</a>
            <a href="#/about" data-testid="link-about">About</a>
            <a href="#/users/42" data-testid="link-user">User 42</a>
        </nav>

        <main data-testid="outlet">
            <div v-if="route === '/'">
                <h1>Home</h1>
                <p>Welcome home.</p>
            </div>
            <div v-else-if="route === '/about'">
                <h1>About</h1>
                <p>About page.</p>
            </div>
            <div v-else-if="userId">
                <h1>User {{ userId }}</h1>
                <p>Profile for user {{ userId }}.</p>
            </div>
            <div v-else>
                <h1>Not found</h1>
            </div>
        </main>
    </div>

    <script src="vue.global.prod.js"></script>
    <script src="router.js"></script>
</body>
</html>
